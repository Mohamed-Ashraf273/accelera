name: Tests

on:
  push:
  pull_request:
  workflow_call:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  run_tests:
    name: Run pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      - name: Install LLVM/Clang for code parallelizer
        run: |
          # Install LLVM 18 first
          sudo bash shell/install_llvm.sh 18
          # Remove broken LLVM cmake configs from other versions (but keep LLVM 18)
          sudo rm -rf /usr/lib/cmake/clang-1[0-7] /usr/lib/llvm-1[0-7]/lib/cmake 2>/dev/null || true
          # Verify LLVM 18 is properly installed
          llvm-config-18 --version
          clang-18 --version
          ls -la /usr/lib/llvm-18/lib/cmake/
          clang-18 --version
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: pip cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
      - name: Build C++ components
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build .
      - name: Test with pytest
        run: pytest accelera/ -v

  format_test:
    name: Check code format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: pip cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
          pip install pre-commit clang-format
      - name: Run pre-commit
        run: pre-commit run --all-files --hook-stage manual
      - name: Run clang-format check
        run: |
          find . -type f \( -name "*.cpp" -o -name "*.hpp" \) -exec clang-format --dry-run --Werror {} +
