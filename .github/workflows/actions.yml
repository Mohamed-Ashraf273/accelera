name: Tests

on:
  push:
  pull_request:
  workflow_call:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  run_tests:
    name: Run pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      - name: Install LLVM/Clang for code parallelizer
        run: |
          sudo bash shell/install_llvm.sh
      - name: Remove conflicting LLVM versions
        run: |
          sudo apt-get remove -y llvm-18* clang-18* || true
          sudo rm -rf /usr/lib/llvm-18 /usr/lib/cmake/clang-18 || true
      - name: Verify LLVM 14 installation
        run: |
          echo "Checking LLVM 14 installation..."
          llvm-config-14 --version
          ls -la /usr/lib/llvm-14/lib/cmake/ || echo "CMake configs not found"
          echo "Available LLVM versions:"
          ls -d /usr/lib/llvm-* 2>/dev/null || echo "No LLVM installations found"
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: pip cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
      - name: Build C++ components
        run: |
          mkdir -p build
          cd build
          export LLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm
          export Clang_DIR=/usr/lib/llvm-14/lib/cmake/clang
          cmake .. -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm -DClang_DIR=/usr/lib/llvm-14/lib/cmake/clang
          cmake --build .
      - name: Test with pytest
        run: pytest accelera/ -v

  format_test:
    name: Check code format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: pip cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
          pip install pre-commit clang-format
      - name: Run pre-commit
        run: pre-commit run --all-files --hook-stage manual
      - name: Run clang-format check
        run: |
          find . -type f \( -name "*.cpp" -o -name "*.hpp" \) -exec clang-format --dry-run --Werror {} +
