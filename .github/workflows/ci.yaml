name: Deploy Docs
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install mkdocs mkdocs-material mkdocstrings mkdocstrings-python
      - run: mkdocs gh-deploy --force